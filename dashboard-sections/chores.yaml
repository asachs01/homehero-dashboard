# --- LEADERBOARD ---
- type: grid
  cards:
    - type: vertical-stack
      cards:
        - type: custom:button-card
          name: Leaderboard
          icon: mdi:trophy
          show_icon: true
          show_name: true
          styles:
            card:
              - background: "rgba(255, 255, 255, 0.85)"
              - border-radius: "20px 20px 0 0"
              - box-shadow: "0 2px 8px rgba(0,0,0,0.06)"
              - padding: "16px"
              - border: "none"
            icon:
              - color: "#FFD600"
              - width: "32px"
            name:
              - font-size: "1.2em"
              - font-weight: "700"
              - color: "#333"

        # Leaderboard entries using markdown for dynamic sorting
        - type: markdown
          content: |
            {% set members = [] %}
            {% set active = states('input_number.chore_active_members') | int(4) %}
            {% for m in range(1, active + 1) %}
              {% set name = states('input_text.chore_member_' ~ m ~ '_name') %}
              {% set pct = states('sensor.chore_completion_member_' ~ m) | int(0) %}
              {% set streak = states('counter.chore_streak_member_' ~ m) | int(0) %}
              {% set members = members + [{'name': name, 'pct': pct, 'streak': streak}] %}
            {% endfor %}
            {% for m in members | sort(attribute='pct', reverse=true) %}
            **{{ loop.index }}.** {{ m.name }} &mdash; {{ m.pct }}% today | {{ m.streak }} day streak
            {% endfor %}
          card_mod:
            style: |
              ha-card {
                background: rgba(255, 255, 255, 0.7) !important;
                border-radius: 0 0 20px 20px !important;
                box-shadow: none !important;
                border: none !important;
                padding: 8px 20px 16px;
                font-size: 1.05em;
                line-height: 2em;
              }
      grid_options:
        columns: 40
        rows: auto

    # ===================================================================
    #  PARENT ADMIN CARD
    # ===================================================================
    - type: vertical-stack
      cards:
        - type: custom:button-card
          name: Manage Chores
          icon: mdi:cog
          show_icon: true
          show_name: true
          tap_action:
            action: navigate
            navigation_path: "#chores-admin"
          styles:
            card:
              - background: "#393745"
              - border-radius: "20px"
              - box-shadow: "0 2px 8px rgba(0,0,0,0.06)"
              - padding: "16px"
              - border: "none"
              - cursor: "pointer"
            icon:
              - color: "snow"
              - width: "28px"
            name:
              - font-size: "1.1em"
              - font-weight: "600"
              - color: "snow"
      grid_options:
        columns: 40
        rows: auto

  column_span: 10
  visibility:
    - condition: state
      entity: input_boolean.show_chores_section
      state: "on"

# --- CHORES ADMIN POPUP ---
- type: grid
  cards:
    - type: vertical-stack
      cards:
        - type: custom:bubble-card
          card_type: pop-up
          hash: "#chores-admin"
          button_type: name
          name: Chore Administration
          icon: mdi:clipboard-edit
          show_icon: true
          show_name: true
          styles: |
            .bubble-button-card-container {
              background: #393745 !important;
            }

        # Family member names
        - type: entities
          title: Family Members
          entities:
            - entity: input_number.chore_active_members
              name: Active Members
            - entity: input_text.chore_member_1_name
