# ==============================================================================
#  CHORES & ROUTINES DASHBOARD SECTION
# ==============================================================================
#  Add these cards to your dashboard.yaml under the sections list.
#  Requires: packages/chores.yaml
#  Requires: card-mod, button-card, bubble-card (HACS)
# ==============================================================================

# --- CHORES SECTION HEADER ---
- type: grid
  cards:
    - type: markdown
      content: <font color="Black" size="6">Chores & Routines</font>
      card_mod:
        style: |
          ha-card {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            padding: 0 16px;
          }
      grid_options:
        columns: 100
        rows: auto

    # Overall daily progress bar
    - type: custom:button-card
      entity: sensor.chore_daily_completion
      name: "Today's Progress"
      icon: mdi:chart-arc
      show_state: true
      state_display: "[[[ return entity.state + '% done'; ]]]"
      styles:
        card:
          - background: "rgba(255, 255, 255, 0.85)"
          - border-radius: "20px"
          - box-shadow: "0 2px 8px rgba(0,0,0,0.06)"
          - padding: "12px 20px"
          - border: "none"
        grid:
          - grid-template-areas: '"i n s"'
          - grid-template-columns: "36px 1fr auto"
        icon:
          - color: |
              [[[
                const pct = parseInt(entity.state);
                if (pct >= 100) return '#4CAF50';
                if (pct >= 50) return '#FF9800';
                return '#F44336';
              ]]]
          - width: "30px"
        name:
          - font-size: "1.1em"
          - font-weight: "600"
          - color: "#333"
          - justify-self: "start"
        state:
          - font-size: "1em"
          - color: "#666"
        custom_fields:
          bar:
            - position: "absolute"
            - bottom: "0"
            - left: "0"
            - height: "4px"
            - border-radius: "0 0 20px 20px"
            - transition: "width 0.5s ease"
      custom_fields:
        bar: |
          [[[
            const pct = entity.state;
            const color = pct >= 100 ? '#4CAF50' : pct >= 50 ? '#FF9800' : '#F44336';
            return `<div style="width:${pct}%;height:4px;background:${color};border-radius:0 0 20px 20px;position:absolute;bottom:0;left:0;"></div>`;
          ]]]
      grid_options:
        columns: 20
        rows: auto
  column_span: 10
  visibility:
    - condition: state
      entity: input_boolean.show_chores_section
      state: "on"

