HomeHero Playful:
  card-mod-theme: HomeHero Playful

  # ── Font Loading (kid-friendly rounded font) ────────────────────────────
  card-mod-root-yaml: |
    .: |
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  primary-font-family: "'Nunito', sans-serif"

  # ── Font Application ─────────────────────────────────────────────────────
  ha-card-header-font-family: "var(--primary-font-family)"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "var(--primary-font-family)"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"

  # ── Playful Colors ─────────────────────────────────────────────────────
  modes:
    light:
      primary-text-color: "#2d3436"
      secondary-text-color: "#636e72"
      primary-color: "#6c5ce7"
      accent-color: "#fd79a8"
      primary-background-color: "#ffeaa7"
      secondary-background-color: "#ffffff"
      card-background-color: "rgba(255, 255, 255, 0.9)"
      divider-color: "#dfe6e9"
      state-icon-color: "#6c5ce7"
      sidebar-background-color: "#6c5ce7"
      sidebar-text-color: "#ffffff"
      sidebar-icon-color: "#ffeaa7"

  # ── Rounded Corners & Playful Card Style ────────────────────────────────
  ha-card-border-radius: "20px"
  ha-card-box-shadow: "0 4px 15px rgba(108, 92, 231, 0.15)"

  # ── Calendar Colors (bright, kid-friendly) ──────────────────────────────
  calendar1-default-primary-color: "#ff6b6b"
  calendar2-default-primary-color: "#feca57"
  calendar3-default-primary-color: "#48dbfb"
  calendar4-default-primary-color: "#c56cf0"
  family-default-primary-color: "#6c5ce7"
  birthdays-default-primary-color: "#2ed573"
  holidays-default-primary-color: "#ff9f43"
