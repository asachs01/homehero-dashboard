Skylight Dark:
  card-mod-theme: Skylight Dark

  # ── Font Loading ──────────────────────────────────────────────────────────
  card-mod-root-yaml: |
    .: |
      @import url('https://fonts.googleapis.com/css2?family=Ovo&display=swap');

  primary-font-family: "'Ovo', serif"

  # ── Font Application ─────────────────────────────────────────────────────
  ha-card-header-font-family: "var(--primary-font-family)"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "var(--primary-font-family)"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"

  # ── Dark Mode Colors ───────────────────────────────────────────────────
  modes:
    dark:
      primary-text-color: "#e0e0e0"
      secondary-text-color: "#a0a0a0"
      primary-color: "#5c9ce6"
      accent-color: "#8b9cf7"
      primary-background-color: "#1a1a2e"
      secondary-background-color: "#16213e"
      card-background-color: "rgba(30, 30, 50, 0.85)"
      divider-color: "#2a2a4a"
      state-icon-color: "#c0c0c0"
      paper-item-icon-color: "#c0c0c0"
      sidebar-text-color: "#e0e0e0"
      sidebar-background-color: "#16213e"
      sidebar-icon-color: "#8b9cf7"

  # ── Calendar Colors (brighter for dark backgrounds) ─────────────────────
  calendar1-default-primary-color: "#ff9a8d"
  calendar2-default-primary-color: "#ffd08a"
  calendar3-default-primary-color: "#8ecae6"
  calendar4-default-primary-color: "#d4b8e8"
  family-default-primary-color: "#5c9ce6"
  birthdays-default-primary-color: "#52c41a"
  holidays-default-primary-color: "#ffa940"
