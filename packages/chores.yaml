        unit_of_measurement: "%"

# --- AUTOMATIONS ---
automation:
  # Reset all chores at midnight
  - id: chores_daily_reset
    alias: "Chores: Daily Reset"
    trigger:
      - platform: time
        at: "00:00:00"
    action:
      # Check each member's completion before reset to update streaks
      - action: script.chores_update_streaks
      # Reset all chore toggles
      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.chore_1_done
            - input_boolean.chore_2_done
            - input_boolean.chore_3_done
            - input_boolean.chore_4_done
            - input_boolean.chore_5_done
            - input_boolean.chore_6_done
            - input_boolean.chore_7_done
            - input_boolean.chore_8_done
            - input_boolean.chore_9_done
            - input_boolean.chore_10_done
            - input_boolean.chore_11_done
            - input_boolean.chore_12_done
            - input_boolean.chore_13_done
            - input_boolean.chore_14_done
            - input_boolean.chore_15_done
            - input_boolean.chore_16_done
            - input_boolean.chore_17_done
            - input_boolean.chore_18_done
            - input_boolean.chore_19_done
            - input_boolean.chore_20_done

# --- SCRIPTS ---
script:
  chores_update_streaks:
    alias: "Chores: Update Streaks"
    sequence:
      # For each active member, check if all their chores are done.
      # If yes, increment streak. If no, reset streak.
      - repeat:
          count: 6
          sequence:
            - variables:
                member_num: "{{ repeat.index }}"
                active_members: "{{ states('input_number.chore_active_members') | int(4) }}"
                active_chores: "{{ states('input_number.chore_active_count') | int(10) }}"
            - condition: template
              value_template: "{{ member_num | int <= active_members }}"
            - choose:
                # All chores done for this member
                - conditions:
                    - condition: template
                      value_template: >
                        {% set ns = namespace(total=0, done=0) %}
                        {% for i in range(1, active_chores + 1) %}
                          {% if states('input_number.chore_' ~ i ~ '_assigned') | int(0) == member_num | int %}
                            {% set ns.total = ns.total + 1 %}
                            {% if is_state('input_boolean.chore_' ~ i ~ '_done', 'on') %}
                              {% set ns.done = ns.done + 1 %}
                            {% endif %}
                          {% endif %}
                        {% endfor %}
                        {{ ns.total > 0 and ns.done == ns.total }}
                  sequence:
                    - action: counter.increment
                      target:
                        entity_id: "counter.chore_streak_member_{{ member_num }}"
              # Not all done - reset streak
              default:
                - action: counter.reset
                  target:
                    entity_id: "counter.chore_streak_member_{{ member_num }}"
