# --- TEMPLATE SENSORS ---
template:
  - sensor:
      # Per-member completion percentage
      - name: "Chore Completion Member 1"
        unique_id: chore_completion_member_1
        icon: mdi:percent
        state: >
          {% set active = states('input_number.chore_active_count') | int(0) %}
          {% set ns = namespace(total=0, done=0) %}
          {% for i in range(1, active + 1) %}
            {% if states('input_number.chore_' ~ i ~ '_assigned') | int(0) == 1 %}
              {% set ns.total = ns.total + 1 %}
              {% if is_state('input_boolean.chore_' ~ i ~ '_done', 'on') %}
                {% set ns.done = ns.done + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {% if ns.total > 0 %}
            {{ ((ns.done / ns.total) * 100) | round(0) }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "%"

      - name: "Chore Completion Member 2"
