# ==============================================================================
#  GROCERY & MEAL PLANNING INTEGRATION PACKAGE
# ==============================================================================
#  Supports: Grocy (native HA integration) + AnyList (REST-based)
#
#  INSTRUCTIONS:
#  1. Place this file in your /config/packages/ folder.
#  2. Ensure your configuration.yaml has:
#     homeassistant:
#       packages: !include_dir_named packages
#  3. Install the Grocy HA integration (HACS or built-in) for full support.
#  4. For AnyList: configure the REST sensor with your AnyList credentials
#     (see the anylist section below for manual setup notes).
#  5. RESTART Home Assistant.
# ==============================================================================

# --- VISIBILITY TOGGLES ---
input_boolean:
  show_grocery_list:
    name: Show Grocery List
    icon: mdi:cart
    initial: true
  show_meal_plan:
    name: Show Meal Plan
    icon: mdi:silverware-fork-knife
    initial: true
  show_anylist:
    name: Show AnyList
    icon: mdi:format-list-checks
    initial: true
  show_grocery_section:
    name: Show Grocery & Meals Section
    icon: mdi:food-apple
    initial: true

# --- GROCY QUICK-ADD HELPERS ---
input_text:
  grocy_quick_add_item:
    name: Quick Add Grocery Item
    icon: mdi:plus-circle
    max: 255
  anylist_quick_add_item:
    name: Quick Add AnyList Item
    icon: mdi:plus-circle
    max: 255

# --- SHELL COMMANDS (fallback if Grocy custom component not installed) ---
# Configure GROCY_API_URL and GROCY_API_KEY in your secrets.yaml
# Example secrets.yaml entries:
#   grocy_api_url: "http://your-grocy-instance:9283/api"
#   grocy_api_key: "your-grocy-api-key-here"
shell_command:
  grocy_add_shopping_list_item: >
    curl -s -X POST
    "{{ states('input_text.grocy_api_url') | default('!secret grocy_api_url', true) }}/objects/shopping_list"
    -H "GROCY-API-KEY: !secret grocy_api_key"
    -H "Content-Type: application/json"
    -d '{"product_id": null, "note": "{{ states("input_text.grocy_quick_add_item") }}", "amount": 1}'

# --- TEMPLATE SENSORS ---
template:
  - sensor:
      # Grocy Shopping List Count
      # Requires the Grocy integration to populate sensor.grocy_shopping_list
      - name: "Grocy Shopping List Count"
        unique_id: grocy_shopping_list_count
        icon: mdi:cart
        state: >
          {% set items = state_attr('sensor.grocy_shopping_list', 'items') %}
          {% if items is not none %}
            {{ items | length }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "items"

      # Products expiring within 3 days
      # Requires Grocy integration sensor.grocy_expiring_products
      - name: "Grocy Expiring Soon"
        unique_id: grocy_expiring_soon
        icon: mdi:clock-alert
        state: >
          {% set products = state_attr('sensor.grocy_expiring_products', 'products') %}
          {% if products is not none %}
            {{ products | length }}
          {% else %}
            0
          {% endif %}
        unit_of_measurement: "items"
        attributes:
          items: >
            {% set products = state_attr('sensor.grocy_expiring_products', 'products') %}
            {% if products is not none %}
              {{ products | map(attribute='name') | list }}
            {% else %}
              []
            {% endif %}

      # Today's meal plan from Grocy
      # Requires Grocy integration sensor.grocy_meal_plan
      - name: "Grocy Meal Plan Today"
        unique_id: grocy_meal_plan_today
        icon: mdi:silverware-fork-knife
        state: >
          {% set meals = state_attr('sensor.grocy_meal_plan', 'meals') %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% if meals is not none %}
            {% set todays_meals = meals | selectattr('day', 'equalto', today) | list %}
            {% if todays_meals | length > 0 %}
              {{ todays_meals | map(attribute='recipe') | map(attribute='name') | join(', ') }}
            {% else %}
              No meals planned
            {% endif %}
          {% else %}
            No meals planned
          {% endif %}
        attributes:
          meal_count: >
            {% set meals = state_attr('sensor.grocy_meal_plan', 'meals') %}
            {% set today = now().strftime('%Y-%m-%d') %}
            {% if meals is not none %}
              {{ meals | selectattr('day', 'equalto', today) | list | length }}
            {% else %}
              0
            {% endif %}

