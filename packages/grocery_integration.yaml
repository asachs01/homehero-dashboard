# --- SCRIPTS ---
script:
  grocy_quick_add_to_shopping_list:
    alias: "Grocy: Quick Add to Shopping List"
    icon: mdi:cart-plus
    sequence:
      - condition: template
        value_template: "{{ states('input_text.grocy_quick_add_item') | length > 0 }}"
      - action: shell_command.grocy_add_shopping_list_item
      - action: input_text.set_value
        target:
          entity_id: input_text.grocy_quick_add_item
        data:
          value: ""
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.grocy_shopping_list

  anylist_quick_add_item:
    alias: "AnyList: Quick Add Item"
    icon: mdi:plus-circle
    sequence:
      # This is a placeholder - actual implementation depends on
      # which AnyList access method you configure above.
      - condition: template
        value_template: "{{ states('input_text.anylist_quick_add_item') | length > 0 }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.anylist_quick_add_item
        data:
          value: ""
