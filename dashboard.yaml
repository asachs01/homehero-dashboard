      # --- Edit/Delete Event Popup ---
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: pop-up
                hash: "#editcalendarevent"
                button_type: name
                name: Edit Calendar Event
                icon: mdi:calendar-edit
                show_icon: true
                show_name: true
                styles: |
                  .bubble-button-card-container {
                    background: var(--family-default-primary-color) !important;
                  }
              - type: vertical-stack
                cards:
                  - type: entities
                    entities:
                      - entity: input_text.edit_event_uid
                        name: Event UID
                      - entity: input_select.edit_event_calendar
                        name: Calendar
                      - entity: input_text.edit_event_title
                        name: Event Title
                      - entity: input_text.edit_event_description
                        name: Description
                      - entity: input_boolean.edit_event_all_day
                        name: All Day Event
                    title: Edit Event
                  - type: conditional
                    conditions:
                      - entity: input_boolean.edit_event_all_day
                        state: "off"
                    card:
                      type: entities
                      entities:
                        - entity: input_datetime.edit_event_start
                          name: Start Time
                        - entity: input_datetime.edit_event_end
                          name: End Time
                  - type: conditional
                    conditions:
                      - entity: input_boolean.edit_event_all_day
                        state: "on"
                    card:
                      type: entities
                      entities:
                        - entity: input_datetime.edit_event_day_start
                          name: Start Date
                        - entity: input_datetime.edit_event_day_end
                          name: End Date
                  - type: horizontal-stack
                    cards:
                      - type: custom:button-card
                        name: Save Changes
                        icon: mdi:content-save
                        tap_action:
                          action: perform-action
                          perform_action: script.save_edited_calendar_event
                        styles:
                          card:
                            - background-color: "#4CAF50"
                            - color: white
                      - type: custom:button-card
                        name: Delete Event
                        icon: mdi:delete
                        tap_action:
                          action: perform-action
                          perform_action: script.delete_calendar_event
                          confirmation:
                            text: Are you sure you want to delete this event?
                        styles:
                          card:
                            - background-color: "#F44336"
                            - color: white
        column_span: 10
      # --- End Edit/Delete Event Popup ---
    cards: []
    icon: mdi:calendar-blank-multiple
    background:
      opacity: 62
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
